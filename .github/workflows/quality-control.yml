name: 代码质量控制

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: "Vue/TypeScript 代码质量检查"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: ESLint
        run: npx eslint . --ext .vue,.ts,.js --max-warnings 0

      - name: Prettier 格式检查
        run: npx prettier --check "src/**/*.{vue,ts,js,css,json}"

      - name: TypeScript 类型检查
        run: npm run type-check

      - name: Vite Build
        run: npm run build
